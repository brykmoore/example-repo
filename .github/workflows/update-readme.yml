name: AI README Updater

on:
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - 'README.md'

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD -- . ':(exclude)README.md' | head -c 12000 > /tmp/pr.diff
          echo "Diff size: $(wc -c < /tmp/pr.diff) bytes"

      - name: Call GitHub Models API and update README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, os, sys, urllib.request

          diff = open("/tmp/pr.diff").read()
          readme = open("README.md").read() if os.path.exists("README.md") else "# Project\n\nNo README yet."

          payload = json.dumps({
            "model": "openai/gpt-4.1",
            "temperature": 0.3,
            "max_tokens": 4096,
            "messages": [
              {
                "role": "system",
                "content": (
                  "You are a technical writer. Given a git diff and the current README, "
                  "update the README to reflect significant changes: new files, removed features, "
                  "changed APIs, new dependencies, config changes. Preserve existing structure. "
                  "Only update sections relevant to the diff. "
                  "Return ONLY the full updated README in markdown, no commentary."
                )
              },
              {
                "role": "user",
                "content": f"Current README:\n{readme}\n\nGit diff:\n{diff}\n\nReturn the updated README."
              }
            ]
          }).encode()

          req = urllib.request.Request(
            "https://models.github.ai/inference/chat/completions",
            data=payload,
            headers={
              "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
              "Content-Type": "application/json",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
            },
            method="POST"
          )

          with urllib.request.urlopen(req) as resp:
            data = json.loads(resp.read())

          updated = data["choices"][0]["message"]["content"]
          open("README.md", "w").write(updated)
          print("README updated successfully")
          PYEOF

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet README.md && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated README
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: auto-update README based on PR changes [skip ci]"
          git push

      - name: Comment on PR
        if: steps.changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '📝 **README auto-updated** by AI based on the changes in this PR.\n\nReview the commit to ensure the updates look accurate.'
            })
