name: AI README Updater

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need HEAD and HEAD~1 to diff

      - name: Get diff of merged commit
        run: |
          git diff HEAD~1 HEAD -- . ':(exclude)README.md' | head -c 12000 > /tmp/pr.diff
          echo "Diff size: $(wc -c < /tmp/pr.diff) bytes"

      - name: Call GitHub Models API and update README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request

          diff = open("/tmp/pr.diff").read().strip()
          readme = open("README.md").read() if os.path.exists("README.md") else "# Project\n\nNo README yet."

          if not diff:
            print("No relevant diff found, skipping.")
            open("/tmp/readme_changed", "w").write("false")
            exit(0)

          payload = json.dumps({
            "model": "openai/gpt-4.1",
            "temperature": 0.3,
            "max_tokens": 4096,
            "messages": [
              {
                "role": "system",
                "content": (
                  "You are a technical writer. Given a git diff and the current README, "
                  "update the README to reflect significant changes: new files, removed features, "
                  "changed APIs, new dependencies, config changes. Preserve existing structure. "
                  "Only update sections relevant to the diff. "
                  "Return ONLY the full updated README in markdown, no commentary."
                )
              },
              {
                "role": "user",
                "content": f"Current README:\n{readme}\n\nGit diff:\n{diff}\n\nReturn the updated README."
              }
            ]
          }).encode()

          req = urllib.request.Request(
            "https://models.github.ai/inference/chat/completions",
            data=payload,
            headers={
              "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
              "Content-Type": "application/json",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
            },
            method="POST"
          )

          with urllib.request.urlopen(req) as resp:
            data = json.loads(resp.read())

          updated = data["choices"][0]["message"]["content"]

          if updated.strip() == readme.strip():
            print("No README changes needed.")
            open("/tmp/readme_changed", "w").write("false")
          else:
            open("README.md", "w").write(updated)
            open("/tmp/readme_changed", "w").write("true")
            print("README updated successfully.")
          PYEOF

      - name: Push branch and open PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          changed=$(cat /tmp/readme_changed)
          if [ "$changed" != "true" ]; then
            echo "No changes, skipping PR creation."
            exit 0
          fi

          BRANCH="docs/auto-readme-$(date +%Y%m%d-%H%M%S)"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add README.md
          git commit -m "docs: auto-update README based on recent changes"
          git push origin "$BRANCH"

          # Get the commit message that triggered this run
          TRIGGER_MSG=$(git log -1 --pretty=%s HEAD~1 2>/dev/null || echo "recent changes")

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "docs: update README" \
            --body "$(cat <<EOF
          ## 📝 Auto-generated README update

          This PR was automatically created after the following commit was merged into \`main\`:

          > $TRIGGER_MSG

          Please review the changes to ensure they are accurate before merging.
          EOF
          )"
